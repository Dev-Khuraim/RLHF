services:
  backend:
    build: ./backend
    ports:
      - "3001:3001"
    volumes:
      - backend-data:/app/data
    environment:
      - PORT=3001

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://backend:3001
    depends_on:
      - backend

volumes:
  backend-data:
